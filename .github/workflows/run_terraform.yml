name: Deploy Application Services

on:
  push:
    branches:
      - main
    # Only trigger if changes happen in modules or app environments
    paths:
      - 'modules/**'
      - 'environments/dev/app-service/**'
      # - 'environments/dev/another-app/**' # Add other apps here
  pull_request:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/dev/app-service/**'

jobs:
  terraform-deploy:
    name: "Deploy Apps"
    runs-on: ubuntu-latest

    # Use a matrix to run deployments for multiple apps in parallel
    strategy:
      matrix:
        app_path: [
          'environments/dev/app-service'
          # 'environments/dev/another-app' # Add more app paths here
        ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Terraform Init
        working-directory: ${{ matrix.app_path }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ matrix.app_path }}
        run: terraform plan -no-color

#      - name: Terraform Apply
#        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
#        working-directory: ${{ matrix.app_path }}
#        run: terraform apply -auto-approve