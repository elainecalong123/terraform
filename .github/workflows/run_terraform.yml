name: App Infrastructure Deploy

on:
  push:
    branches: [ main ]
    # The workflow ONLY starts if a file in these paths changes
    paths:
      - 'modules/**'
      - 'environments/dev/ecommerce/**'
      - 'environments/dev/crm/**'
      - 'environments/dev/web/**'
      - 'environments/dev/ciam/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'modules/**'
      - 'environments/dev/ecommerce/**'
      - 'environments/dev/crm/**'
      - 'environments/dev/web/**'
      - 'environments/dev/ciam/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # This filter decides WHICH matrix jobs to run
          filters: |
            ecommerce: 
              - 'modules/**'
              - 'environments/dev/ecommerce/**'
            crm: 
              - 'modules/**'
              - 'environments/dev/crm/**'
            web: 
              - 'modules/**'
              - 'environments/dev/web/**'
            ciam: 
              - 'modules/**'
              - 'environments/dev/ciam/**'

  terraform:
    needs: changes
    # Only run if at least one app filter matched
    if: ${{ needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Plan
        env:
          APP_PATH: "environments/dev/${{ matrix.app }}"
        run: |
          # Check if the directory exists before moving into it
          if [ -d "$APP_PATH" ]; then
            cd $APP_PATH
            terraform init
            terraform plan -no-color
          else
            echo "Directory $APP_PATH not found. Skipping."
            exit 1
          fi