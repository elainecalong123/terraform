name: App Infrastructure Deploy

on:
  push:
    branches: [ main ]
    # The workflow ONLY starts if a file in these paths changes
    paths:
      - 'modules/**'
      - 'environments/dev/ecommerce/**'
      - 'environments/dev/crm/**'
      - 'environments/dev/web/**'
      - 'environments/dev/ciam/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'modules/**'
      - 'environments/dev/ecommerce/**'
      - 'environments/dev/crm/**'
      - 'environments/dev/web/**'
      - 'environments/dev/ciam/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # This filter decides WHICH matrix jobs to run
          filters: |
            ecommerce: 
              - 'modules/**'
              - 'environments/dev/ecommerce/**'
            crm: 
              - 'modules/**'
              - 'environments/dev/crm/**'
            web: 
              - 'modules/**'
              - 'environments/dev/web/**'
            ciam: 
              - 'modules/**'
              - 'environments/dev/ciam/**'

  terraform:
    needs: changes
    # Only run if at least one app filter matched
    if: ${{ needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1
          mask-aws-account-id: true

      - name: Create Temporary AWS Profile
        # This creates the 'secondary-account' profile Terraform is looking for
        # and points it to the credentials we just configured.
        run: |
          mkdir -p ~/.aws
          echo "[profile secondary-account]" > ~/.aws/config
          echo "region = ap-southeast-1" >> ~/.aws/config
          echo "output = json" >> ~/.aws/config
          
          echo "[profile secondary-account]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >>

      - name: Terraform Init & Plan
        env:
          APP_PATH: "environments/dev/${{ matrix.app }}"
          AWS_PROFILE: secondary-account
        run: |
          # Check if the directory exists before moving into it
          if [ -d "$APP_PATH" ]; then
            cd $APP_PATH
            terraform init
            terraform plan -no-color
          else
            echo "Directory $APP_PATH not found. Skipping."
            exit 1
          fi